<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleção de Jogadores</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="cabecalho">
    <h1>Coleção de Jogadores ⚽</h1>

    <nav class="menu">
      <a href="#">Início</a>
      <a href="#">Jogadores</a>
      <a href="#">Times</a>
      <a href="#">Contato</a>
    </nav>

    <form class="pesquisa">
        <input type="text" placeholder="Pesquisar jogador">
        <button type="submit">Buscar</button>
    </form>
</header>

<main>

    <section class="banner">
        <h2>Destaques do Futebol</h2>
    </section>

    <section class="jogadores">
        <h2>Jogadores em destaque</h2>

        <div class="lista">

            <article class="card">
                <img src="https://picsum.photos/id/1011/200/150">
                <h3>Jogador 1</h3>
                <p>Time A</p>
            </article>

            <article class="card">
                <img src="https://picsum.photos/id/1025/200/150">
                <h3>Jogador 2</h3>
                <p>Time B</p>
            </article>

            <article class="card">
                <img src="https://picsum.photos/id/1040/200/150">
                <h3>Jogador 3</h3>
                <p>Time C</p>
            </article>

        </div>
    </section>

    <section class="sobre">
        <h2>Sobre o Projeto</h2>
        <p>Este site apresenta uma coleção de jogadores de futebol.</p>
    </section>

</main>

<footer class="rodape">
    <p>© 2026 - Projeto Acadêmico</p>
</footer>

</body>
</html>
